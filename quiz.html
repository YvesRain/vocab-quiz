<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基础英语4 · 词汇测试</title>
<style>
:root {
  --bg: #f0f2f5;
  --card: #fff;
  --primary: #003366;
  --accent: #006644;
  --danger: #c0392b;
  --success: #27ae60;
  --warn: #e67e22;
  --text: #2c3e50;
  --muted: #95a5a6;
  --border: #e0e4e8;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 20px; }

/* Header */
.header { text-align: center; padding: 32px 20px 20px; }
.header h1 { font-size: 1.8rem; color: var(--primary); margin-bottom: 4px; }
.header .subtitle { color: var(--muted); font-size: 0.9rem; }

/* Card */
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px; margin-bottom: 16px; }

/* Screen visibility */
.screen { display: none; }
.screen.active { display: block; }

/* Home Screen */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.mode-card { border: 2px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; text-align: center; transition: all 0.2s; }
.mode-card:hover { border-color: var(--accent); background: #f0faf5; }
.mode-card.selected { border-color: var(--accent); background: #e8f5ee; }
.mode-card .icon { font-size: 1.8rem; margin-bottom: 6px; }
.mode-card .label { font-weight: 600; font-size: 0.95rem; }
.mode-card .desc { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

.unit-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.unit-tag { padding: 8px 14px; border: 2px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; user-select: none; }
.unit-tag:hover { border-color: var(--primary); }
.unit-tag.selected { background: var(--primary); color: #fff; border-color: var(--primary); }

.range-group { display: flex; align-items: center; gap: 10px; margin: 12px 0; flex-wrap: wrap; }
.range-group label { font-weight: 600; font-size: 0.9rem; white-space: nowrap; }
.range-group input[type=range] { flex: 1; min-width: 120px; }
.range-group .range-val { font-weight: 700; color: var(--primary); min-width: 40px; text-align: center; }

.btn { display: inline-block; padding: 12px 32px; border: none; border-radius: 24px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #004080; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,51,102,0.3); }
.btn-outline { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
.btn-outline:hover { background: #f0f4f8; }
.btn-danger { background: #fff; color: var(--danger); border: 2px solid var(--danger); }
.btn-danger:hover { background: #fef0f0; }
.btn-sm { padding: 6px 16px; font-size: 0.82rem; border-radius: 16px; }
.btn-block { display: block; width: 100%; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Quiz Screen */
.quiz-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
.quiz-progress { font-weight: 600; color: var(--muted); font-size: 0.9rem; }
.quiz-timer { font-weight: 700; color: var(--warn); font-size: 0.95rem; }
.quiz-timer.warning { animation: pulse 0.8s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

.definition-box { background: #f8fafc; border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 var(--radius) var(--radius) 0; margin-bottom: 24px; }
.definition-box .tag { display: inline-block; background: var(--accent); color: #fff; font-size: 0.75rem; padding: 3px 10px; border-radius: 10px; margin-bottom: 8px; }
.definition-box .def-text { font-size: 1.1rem; line-height: 1.7; color: var(--text); }

.options { display: flex; flex-direction: column; gap: 10px; }
.option { padding: 14px 18px; border: 2px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 1rem; font-weight: 500; transition: all 0.15s; display: flex; align-items: center; gap: 12px; }
.option:hover { border-color: var(--primary); background: #f8faff; }
.option.selected { border-color: var(--primary); background: #eef3ff; }
.option.correct { border-color: var(--success); background: #e8f8ef; }
.option.wrong { border-color: var(--danger); background: #fef0f0; }
.option .letter { width: 32px; height: 32px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--muted); flex-shrink: 0; }
.option.selected .letter { background: var(--primary); color: #fff; }
.option.correct .letter { background: var(--success); color: #fff; }
.option.wrong .letter { background: var(--danger); color: #fff; }

.feedback { margin-top: 16px; padding: 14px 18px; border-radius: var(--radius); font-weight: 600; font-size: 0.95rem; display: none; }
.feedback.show { display: block; }
.feedback.correct { background: #e8f8ef; color: var(--success); border: 1px solid #a3e4bc; }
.feedback.wrong { background: #fef0f0; color: var(--danger); border: 1px solid #f5c6cb; }

/* Results Screen */
.result-summary { text-align: center; padding: 20px 0; }
.score-circle { width: 130px; height: 130px; border-radius: 50%; margin: 0 auto 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 6px solid; }
.score-circle .pct { font-size: 2.2rem; font-weight: 800; }
.score-circle .label { font-size: 0.8rem; color: var(--muted); }
.score-circle.excellent { border-color: var(--success); color: var(--success); }
.score-circle.good { border-color: var(--accent); color: var(--accent); }
.score-circle.fair { border-color: var(--warn); color: var(--warn); }
.score-circle.poor { border-color: var(--danger); color: var(--danger); }

.result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 16px 0; }
.stat-card { text-align: center; padding: 14px; background: var(--bg); border-radius: var(--radius); }
.stat-card .num { font-size: 1.6rem; font-weight: 800; }
.stat-card .lbl { font-size: 0.78rem; color: var(--muted); }
.stat-card .num.green { color: var(--success); }
.stat-card .num.red { color: var(--danger); }
.stat-card .num.orange { color: var(--warn); }

.high-error-section { margin-top: 16px; }
.high-error-section h3 { font-size: 1.1rem; color: var(--danger); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }

.error-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.error-table th { background: #fef0f0; color: var(--danger); padding: 10px 12px; text-align: left; font-size: 0.8rem; text-transform: uppercase; }
.error-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.error-table .word-col { font-weight: 600; color: var(--primary); }
.error-table .rate-col { font-weight: 700; }
.error-table .rate-col.high { color: var(--danger); }
.error-table .rate-col.mid { color: var(--warn); }

.review-list { max-height: 500px; overflow-y: auto; }
.review-item { padding: 14px; border-bottom: 1px solid var(--border); }
.review-item .q-word { font-weight: 700; color: var(--primary); font-size: 1.05rem; }
.review-item .q-def { color: var(--text); margin: 4px 0; font-size: 0.92rem; line-height: 1.5; }
.review-item .q-meta { font-size: 0.8rem; color: var(--muted); }
.review-item.was-wrong { border-left: 3px solid var(--danger); }
.review-item.was-correct { border-left: 3px solid var(--success); }

/* Charts */
.chart-bar-wrap { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
.chart-bar-label { width: 60px; font-size: 0.8rem; font-weight: 600; text-align: right; }
.chart-bar-track { flex: 1; height: 22px; background: var(--bg); border-radius: 11px; overflow: hidden; }
.chart-bar-fill { height: 100%; border-radius: 11px; transition: width 0.5s; min-width: 2px; display: flex; align-items: center; padding-left: 8px; font-size: 0.72rem; color: #fff; font-weight: 600; }

/* Word Bank */
.word-bank-search { width: 100%; padding: 10px 16px; border: 2px solid var(--border); border-radius: 24px; font-size: 0.95rem; outline: none; margin-bottom: 12px; }
.word-bank-search:focus { border-color: var(--primary); }

.wb-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.wb-table th { background: var(--bg); padding: 10px; text-align: left; font-size: 0.78rem; color: var(--muted); text-transform: uppercase; }
.wb-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.wb-table .wb-word { font-weight: 600; color: var(--primary); cursor: pointer; }
.wb-table .wb-word:hover { text-decoration: underline; }
.wb-table .wb-err { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
.wb-table .wb-err.high { background: #fef0f0; color: var(--danger); }
.wb-table .wb-err.mid { background: #fef5e7; color: var(--warn); }
.wb-table .wb-err.low { background: #e8f8ef; color: var(--success); }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--bg); border-radius: 24px; padding: 4px; }
.tab { flex: 1; padding: 10px 16px; border: none; background: transparent; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.85rem; color: var(--muted); transition: all 0.2s; }
.tab.active { background: var(--card); color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

/* History */
.history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
.history-item .h-score { font-weight: 700; }
.history-item .h-date { color: var(--muted); font-size: 0.8rem; }

/* Toast */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 20px; font-size: 0.9rem; z-index: 999; animation: fadeInOut 2s forwards; }
@keyframes fadeInOut { 0% { opacity:0; top:0; } 15% { opacity:1; top:20px; } 75% { opacity:1; top:20px; } 100% { opacity:0; top:0; } }

/* Responsive */
@media (max-width: 600px) {
  .mode-grid { grid-template-columns: 1fr; }
  .result-stats { grid-template-columns: repeat(3, 1fr); }
  .header h1 { font-size: 1.4rem; }
  .card { padding: 18px; }
}
</style>
</head>

// ==================== HELPERS ====================
function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getFilteredVocab() {
  return VOCAB.filter(v => state.selectedUnits.includes(v.u));
}

function getErrorStats() {
  return LS.get('errorStats', {});
}

function recordAnswer(word, isCorrect) {
  const stats = getErrorStats();
  if (!stats[word]) stats[word] = { total: 0, wrong: 0 };
  stats[word].total++;
  if (!isCorrect) stats[word].wrong++;
  LS.set('errorStats', stats);
}

function getErrorRate(word) {
  const stats = getErrorStats();
  const s = stats[word];
  if (!s || s.total === 0) return 0;
  return s.wrong / s.total;
}

function getHighErrorWords(threshold = 0.3) {
  const stats = getErrorStats();
  return Object.entries(stats)
    .filter(([w, s]) => s.total >= 3 && s.wrong / s.total >= threshold)
    .map(([w, s]) => ({ word: w, rate: s.wrong / s.total, total: s.total, wrong: s.wrong }))
    .sort((a, b) => b.rate - a.rate);
}

function saveHistory(score, total, units, mode) {
  const h = LS.get('history', []);
  h.unshift({ date: new Date().toISOString(), score, total, units, mode });
  if (h.length > 100) h.length = 100;
  LS.set('history', h);
}

function getHistory() { return LS.get('history', []); }

function clearAllData() {
  localStorage.removeItem('vocab_errorStats');
  localStorage.removeItem('vocab_history');
}

// ==================== RENDER ====================
function render() {
  const app = document.getElementById('app');
  switch (state.screen) {
    case 'home': app.innerHTML = renderHome(); break;
    case 'quiz': app.innerHTML = renderQuiz(); break;
    case 'results': app.innerHTML = renderResults(); break;
  }
  bindEvents();
}

}

// ---- QUIZ ----
function renderQuiz() {
  const q = state.quizQuestions[state.currentIndex];
  const vocab = q.vocab;
  const total = state.quizQuestions.length;
  const idx = state.currentIndex;
  const showFB = state.showFeedback;
  const userAnswer = state.answers[idx];

  let optionsHTML = '';
  if (state.mode === 'choice') {
    // definition → choose word
    optionsHTML = q.options.map((opt, i) => {
      let cls = 'option';
      if (showFB && userAnswer) {
        if (opt.w === vocab.w) cls += ' correct';
        else if (opt.w === userAnswer.selectedWord && !userAnswer.isCorrect) cls += ' wrong';
      } else if (!showFB && userAnswer && opt.w === userAnswer.selectedWord) {
        cls += ' selected';
      }
      return `
        <div class="${cls}" data-action="selectOption" data-word="${opt.w}" data-idx="${i}">
          <span class="letter">${'ABCD'[i]}</span>
          <span>${opt.w} ${opt.p ? '<small style="color:var(--muted)">'+opt.p+'</small>' : ''}</span>
        </div>`;
    }).join('');
  } else {
    // reverse: word → choose definition
    optionsHTML = q.options.map((opt, i) => {
      let cls = 'option';
      if (showFB && userAnswer) {
        if (opt.w === vocab.w) cls += ' correct';
        else if (opt.w === userAnswer.selectedWord && !userAnswer.isCorrect) cls += ' wrong';
      } else if (!showFB && userAnswer && opt.w === userAnswer.selectedWord) {
        cls += ' selected';
      }
      return `
        <div class="${cls}" data-action="selectOption" data-word="${opt.w}" data-idx="${i}">
          <span class="letter">${'ABCD'[i]}</span>
          <span style="font-size:0.9rem">${opt.d}</span>
        </div>`;
    }).join('');
  }

  let fbHTML = '';
  if (showFB && userAnswer) {
    const cls = userAnswer.isCorrect ? 'correct' : 'wrong';
    const icon = userAnswer.isCorrect ? '✅' : '❌';
    fbHTML = `
      <div class="feedback show ${cls}">
        ${icon} ${userAnswer.isCorrect ? '回答正确！' : `回答错误。正确答案是 <strong>${vocab.w}</strong> — ${vocab.c}`}
      </div>`;
  }

  const timerHTML = state.timerSeconds > 0
    ? `<span class="quiz-timer ${state.timerSeconds <= 10 ? 'warning' : ''}">⏱ ${Math.floor(state.timerSeconds/60)}:${String(state.timerSeconds%60).padStart(2,'0')}</span>`
    : '';

  return `
    <div class="header" style="padding-top:16px">
      <h1 style="font-size:1.3rem">📝 词汇测试</h1>
    </div>
    <div class="screen active">
      <div class="card">
        <div class="quiz-header">
          <span class="quiz-progress">第 ${idx+1} / ${total} 题</span>
          ${timerHTML}
          <span style="font-size:0.8rem;color:var(--muted)">Unit ${vocab.u}</span>
        </div>
        <div style="background:var(--bg);height:6px;border-radius:3px;margin-bottom:20px">
          <div style="width:${((idx+(showFB?1:0))/total)*100}%;height:100%;background:var(--accent);border-radius:3px;transition:width 0.3s"></div>
        </div>
        <div class="definition-box">
          <span class="tag">${state.mode==='choice' ? '英文释义' : '单词'}</span>
          <div class="def-text">
            ${state.mode==='choice'
              ? vocab.d
              : `<strong>${vocab.w}</strong> ${vocab.p ? '<small style="color:var(--muted)">'+vocab.p+'</small>' : ''}`
            }
          </div>
        </div>
        <div class="options">${optionsHTML}</div>
        ${fbHTML}
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        ${showFB
          ? `<button class="btn btn-primary" data-action="nextQuestion">${idx+1 < total ? '下一题 →' : '查看成绩 📊'}</button>`
          : `<button class="btn btn-outline btn-sm" data-action="skipQuestion">跳过</button>`
        }
      </div>
    </div>
  `;
}

// ---- RESULTS ----
function renderResults() {
  const total = state.quizQuestions.length;
  const correct = state.answers.filter(a => a.isCorrect).length;
  const pct = Math.round(correct / total * 100);
  let cls = pct >= 90 ? 'excellent' : pct >= 70 ? 'good' : pct >= 50 ? 'fair' : 'poor';

  const highErrors = getHighErrorWords(0.3).filter(he =>
    state.quizQuestions.some(q => q.vocab.w === he.word)
  );

  let content = '';
  if (state.resultsTab === 'summary') {
    content = `
      <div class="result-summary">
        <div class="score-circle ${cls}">
          <span class="pct">${pct}%</span>
          <span class="label">正确率</span>
        </div>
        <p style="font-size:1.1rem;font-weight:600">
          ${pct>=90?'🏆 太棒了！' : pct>=70?'👍 表现不错！' : pct>=50?'📖 继续加油！' : '💪 需要更多练习！'}
        </p>
      </div>
      <div class="result-stats">
        <div class="stat-card"><div class="num green">${correct}</div><div class="lbl">✅ 正确</div></div>
        <div class="stat-card"><div class="num red">${total-correct}</div><div class="lbl">❌ 错误</div></div>
        <div class="stat-card"><div class="num orange">${state.timerSeconds ? Math.floor(state.timerSeconds/60)+'分'+state.timerSeconds%60+'秒' : '不限时'}</div><div class="lbl">⏱ 用时</div></div>
      </div>
      ${highErrors.length > 0 ? `
      <div class="high-error-section">
        <h3>⚠️ 高频错误词汇（错误率 ≥ 30%）</h3>

          <thead><tr><th>单词</th><th>错误率</th><th>错误/总次数</th></tr></thead>
          <tbody>
            ${highErrors.map(he => `
              <tr>
                <td class="word-col">${he.word}</td>
                <td class="rate-col ${he.rate>=0.5?'high':'mid'}">${Math.round(he.rate*100)}%</td>
                <td>${he.wrong} / ${he.total}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>` : ''}
    `;
  } else if (state.resultsTab === 'review') {
    content = `
      <div class="review-list">
        ${state.quizQuestions.map((q, i) => {
          const a = state.answers[i];
          const cls = a && a.isCorrect ? 'was-correct' : 'was-wrong';
          const icon = a && a.isCorrect ? '✅' : '❌';
          return `
            <div class="review-item ${cls}">
              <div class="q-word">${icon} ${q.vocab.w} ${q.vocab.p ? '<small style="color:var(--muted)">'+q.vocab.p+'</small>' : ''}</div>
              <div class="q-def">${q.vocab.d}</div>
              <div class="q-meta">中文：${q.vocab.c} ${a ? '| 你选了：<strong>'+(a.selectedWord||'未作答')+'</strong>' : ''} | Unit ${q.vocab.u}</div>
            </div>`;
        }).join('')}
      </div>
    `;
  } else if (state.resultsTab === 'charts') {
    const unitStats = {};
    state.quizQuestions.forEach((q, i) => {
      const u = q.vocab.u;
      if (!unitStats[u]) unitStats[u] = { total: 0, correct: 0 };
      unitStats[u].total++;
      if (state.answers[i] && state.answers[i].isCorrect) unitStats[u].correct++;
    });
    const maxTotal = Math.max(...Object.values(unitStats).map(s => s.total), 1);
    content = `
      <h3 style="margin-bottom:12px">📊 各单元正确率</h3>
      ${Object.entries(unitStats).map(([u, s]) => {
        const pct = Math.round(s.correct / s.total * 100);
        return `
          <div class="chart-bar-wrap">

            </div>
            <span style="font-size:0.78rem;color:var(--muted)">${s.correct}/${s.total}</span>

      <h3 style="margin:20px 0 12px">📈 历史记录（最近10次）</h3>

    <div class="header" style="padding-top:16px">
      <h1 style="font-size:1.3rem">📊 测试结果</h1>
    </div>
    <div class="screen active">
      <div class="card">
        <div class="tabs">

          <button class="tab ${state.resultsTab==='review'?'active':''}" data-action="setResultsTab" data-tab="review">📝 逐题回顾</button>

        <button class="btn btn-outline" data-action="goHome">🏠 返回首页</button>
      </div>
    </div>
  `;
}

// ---- WORD BANK ----
function renderWordBank(searchTerm = '') {
  const stats = getErrorStats();
  let words = [...VOCAB];
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    words = words.filter(v => v.w.toLowerCase().includes(s) || v.d.toLowerCase().includes(s) || v.c.includes(s));
  }
  return `
    <div class="header" style="padding-top:16px">
      <h1 style="font-size:1.3rem">📖 词汇总表</h1>
      <div class="subtitle">全部 ${VOCAB.length} 个词汇 · 点击单词查看详情</div>
    </div>
    <div class="screen active">
      <div class="card">
        <input class="word-bank-search" type="text" placeholder="🔍 搜索单词、释义..." id="wbSearch" value="${searchTerm.replace(/"/g,'&quot;')}">
        <div style="max-height:60vh;overflow-y:auto">
          <table class="wb-table">
            <thead><tr><th>单词</th><th>音标</th><th>英文释义</th><th>中文</th><th>错误率</th></tr></thead>
            <tbody>
              ${words.map(v => {
                const rate = getErrorRate(v.w);

                return `
                  <tr>
                    <td class="wb-word" data-action="showWordDetail" data-word="${v.w}">${v.w}</td>

                    <td style="font-size:0.82rem">${v.d}</td>
                    <td style="font-size:0.85rem">${v.c}</td>
                    <td>${hasData ? `<span class="wb-err ${errCls}">${Math.round(rate*100)}% (${s.wrong}/${s.total})</span>` : '<span style="color:var(--muted);font-size:0.78rem">未测试</span>'}</td>

// ---- STATS ----
function renderStats() {
  const history = getHistory();
  const stats = getErrorStats();
  const totalAnswered = Object.values(stats).reduce((sum, s) => sum + s.total, 0);
  const totalWrong = Object.values(stats).reduce((sum, s) => sum + s.wrong, 0);
  const totalCorrect = totalAnswered - totalWrong;
  const overallRate = totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) : 0;

  // Unit breakdown from history
  const unitPerf = {};
  history.forEach(h => {
    h.units.forEach(u => {
      if (!unitPerf[u]) unitPerf[u] = { total: 0, correct: 0 };
    });
  });
  // Use error stats for unit breakdown
  const unitStatsFromVocab = {};
  VOCAB.forEach(v => {
    if (!unitStatsFromVocab[v.u]) unitStatsFromVocab[v.u] = { total: 0, correct: 0 };
    const s = stats[v.w];
    if (s) {
      unitStatsFromVocab[v.u].total += s.total;
      unitStatsFromVocab[v.u].correct += s.total - s.wrong;
    }
  });

  return `
    <div class="header" style="padding-top:16px">
      <h1 style="font-size:1.3rem">📊 学习统计</h1>
    </div>
    <div class="screen active">
      <div class="card">
        <div class="result-stats">
          <div class="stat-card"><div class="num">${totalAnswered}</div><div class="lbl">总答题数</div></div>
          <div class="stat-card"><div class="num green">${totalCorrect}</div><div class="lbl">正确</div></div>
          <div class="stat-card"><div class="num red">${totalWrong}</div><div class="lbl">错误</div></div>
        </div>
        ${totalAnswered > 0 ? `
          <div style="text-align:center;margin:16px 0">
            <span style="font-size:1.5rem;font-weight:800;color:${overallRate>=70?'var(--success)':overallRate>=40?'var(--warn)':'var(--danger)'}">${overallRate}%</span>
            <span style="color:var(--muted)"> 综合正确率</span>
          </div>
        ` : '<p style="text-align:center;color:var(--muted);padding:20px">还没有答题记录，开始你的第一次测试吧！</p>'}
      </div>
      ${totalAnswered > 0 ? `
      <div class="card">
        <h3 style="margin-bottom:12px">📈 各单元表现</h3>
        ${[1,2,3,4,5,6,7].map(u => {
          const s = unitStatsFromVocab[u] || { total: 0, correct: 0 };
          const pct = s.total > 0 ? Math.round(s.correct / s.total * 100) : 0;
          return `
            <div class="chart-bar-wrap">
              <span class="chart-bar-label">Unit ${u}</span>
              <div class="chart-bar-track">
                <div class="chart-bar-fill" style="width:${Math.max(pct,5)}%;background:${pct>=70?'var(--success)':pct>=40?'var(--warn)':'var(--danger)'}">${s.total>0?pct+'%':'无数据'}</div>
              </div>
              <span style="font-size:0.78rem;color:var(--muted)">${s.total}题</span>
            </div>`;
        }).join('')}
      </div>
      <div class="card">
        <h3 style="margin-bottom:12px">📋 测试历史（最近20次）</h3>
        ${history.slice(0,20).map((h,i) => `
          <div class="history-item">
            <span>${new Date(h.date).toLocaleString('zh-CN')}</span>
            <span>${h.mode==='choice'?'释义→单词':'单词→释义'} · Unit${h.units.sort().join(',')}</span>
            <span class="h-score" style="color:${h.score/h.total>=0.7?'var(--success)':h.score/h.total>=0.4?'var(--warn)':'var(--danger)'}">${h.score}/${h.total}</span>
          </div>
        `).join('')}
      </div>` : ''}
      <button class="btn btn-outline btn-block" data-action="goHome">🏠 返回首页</button>
      ${totalAnswered > 0 ? `<button class="btn btn-danger btn-block btn-sm" style="margin-top:8px" data-action="clearAllData">🗑️ 清除全部数据</button>` : ''}
    </div>
  `;
}

// ==================== ACTIONS ====================
function startQuiz() {
  const vocab = getFilteredVocab();
  const total = Math.min(state.questionCount, vocab.length);
  if (total < 4) { showToast('请至少选择包含4个以上单词的单元'); return; }

  // Select random questions
  const selectedVocab = shuffle(vocab).slice(0, total);

  // For each question, generate 4 options (1 correct + 3 distractors)
  const questions = selectedVocab.map(v => {
    const others = shuffle(VOCAB.filter(vv => vv.w !== v.w));
    const distractors = others.slice(0, 3);
    const options = shuffle([v, ...distractors]);
    return { vocab: v, options };
  });

  state.quizQuestions = questions;
  state.currentIndex = 0;
  state.answers = new Array(questions.length).fill(null);
  state.screen = 'quiz';
  state.showFeedback = false;
  state.quizStartTime = Date.now();
  state.timerSeconds = 0;

  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.timerSeconds = Math.floor((Date.now() - state.quizStartTime) / 1000);
    // Re-render only timer in quiz screen
    const timerEl = document.querySelector('.quiz-timer');
    if (timerEl && state.screen === 'quiz') {
      const s = state.timerSeconds;
      timerEl.textContent = `⏱ ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
      timerEl.className = `quiz-timer ${s <= 10 ? 'warning' : ''}`;
    }
  }, 1000);

  render();
  window.scrollTo(0, 0);
}

function selectOption(word, idx) {
  if (state.showFeedback) return;
  const q = state.quizQuestions[state.currentIndex];
  const isCorrect = word === q.vocab.w;

  state.answers[state.currentIndex] = { selectedWord: word, isCorrect };
  state.showFeedback = true;

  recordAnswer(q.vocab.w, isCorrect);
  render();
}

function nextQuestion() {
  if (state.currentIndex + 1 >= state.quizQuestions.length) {
    finishQuiz();
    return;
  }
  state.currentIndex++;
  state.showFeedback = false;
  render();
  window.scrollTo(0, 0);
}

function skipQuestion() {
  if (state.showFeedback) return;
  state.answers[state.currentIndex] = { selectedWord: null, isCorrect: false };
  if (state.currentIndex + 1 >= state.quizQuestions.length) {
    finishQuiz();
    return;
  }
  state.currentIndex++;
  state.showFeedback = false;
  render();
  window.scrollTo(0, 0);
}

function finishQuiz() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  const total = state.quizQuestions.length;
  const correct = state.answers.filter(a => a && a.isCorrect).length;
  saveHistory(correct, total, state.selectedUnits, state.mode);
  state.screen = 'results';
  state.resultsTab = 'summary';
  render();
  window.scrollTo(0, 0);
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2100);
}

// ==================== EVENT BINDING ====================
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.removeEventListener('click', handleAction);
    el.addEventListener('click', handleAction);
  });

  const qcRange = document.getElementById('qcRange');
  if (qcRange) {
    qcRange.removeEventListener('input', handleQCRange);
    qcRange.addEventListener('input', handleQCRange);
  }

  const wbSearch = document.getElementById('wbSearch');
  if (wbSearch) {
    wbSearch.removeEventListener('input', handleWBSearch);
    wbSearch.addEventListener('input', handleWBSearch);
  }
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  switch (action) {
    case 'setMode':
      state.mode = el.dataset.mode;
      render();
      break;
    case 'toggleUnit':
      const unit = parseInt(el.dataset.unit);
      if (state.selectedUnits.includes(unit)) {
        if (state.selectedUnits.length > 1) state.selectedUnits = state.selectedUnits.filter(u => u !== unit);
      } else {
        state.selectedUnits = [...state.selectedUnits, unit].sort();
      }
      state.questionCount = Math.min(state.questionCount, getFilteredVocab().length);
      render();
      break;
    case 'selectAllUnits':
      state.selectedUnits = state.selectedUnits.length === 7 ? [] : [1,2,3,4,5,6,7];
      if (state.selectedUnits.length === 0) state.selectedUnits = [1,2,3,4,5,6,7];
      state.questionCount = Math.min(state.questionCount, getFilteredVocab().length);
      render();
      break;
    case 'startQuiz':
      startQuiz();
      break;
    case 'selectOption':
      selectOption(el.dataset.word, parseInt(el.dataset.idx));
      break;
    case 'nextQuestion':
      nextQuestion();
      break;
    case 'skipQuestion':
      skipQuestion();
      break;
    case 'setResultsTab':
      state.resultsTab = el.dataset.tab;
      render();
      window.scrollTo(0, 0);
      break;
    case 'retrySame':
      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
      state.screen = 'home';
      render();
      window.scrollTo(0, 0);
      setTimeout(startQuiz, 100);
      break;
    case 'retryErrors':
      const errorWords = state.answers.filter(a => a && !a.isCorrect).map(a => {
        const q = state.quizQuestions.find(qq =>
          state.answers[state.quizQuestions.indexOf(qq)] === a
        );
        return q ? q.vocab.w : null;
      }).filter(Boolean);
      if (errorWords.length < 4) {
        showToast('错题不足4个，无法生成专项测试');
        return;
      }
      const errorVocab = VOCAB.filter(v => errorWords.includes(v.w));
      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
      state.selectedUnits = [...new Set(errorVocab.map(v => v.u))];
      state.questionCount = Math.min(errorVocab.length, getFilteredVocab().length);
      state.screen = 'home';
      render();
      window.scrollTo(0, 0);
      setTimeout(startQuiz, 100);
      break;
    case 'goHome':
      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
      state.screen = 'home';
      state.showFeedback = false;
      render();
      window.scrollTo(0, 0);
      break;
    case 'goWordBank':
      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
      document.getElementById('app').innerHTML = renderWordBank();
      bindEvents();
      window.scrollTo(0, 0);
      break;
    case 'goErrorReview':
      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
      document.getElementById('app').innerHTML = renderErrorReview();
      bindEvents();
      window.scrollTo(0, 0);
      break;
    case 'goStats':
      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
      document.getElementById('app').innerHTML = renderStats();
      bindEvents();
      window.scrollTo(0, 0);
      break;
    case 'startErrorQuiz':
      const stats2 = getErrorStats();
      const ew2 = Object.entries(stats2).filter(([w,s]) => s.wrong > 0).map(([w]) => w);
      if (ew2.length < 4) { showToast('错题不足4个'); return; }
      const ev2 = VOCAB.filter(v => ew2.includes(v.w));
      if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
      state.selectedUnits = [...new Set(ev2.map(v => v.u))];
      state.questionCount = Math.min(ev2.length, 20);
      state.screen = 'home';
      render();
      window.scrollTo(0, 0);
      setTimeout(startQuiz, 100);
      break;
    case 'clearErrorStats':
      if (confirm('确定要清除所有错题记录吗？此操作不可撤销。')) {
        localStorage.removeItem('vocab_errorStats');
        showToast('错题记录已清除');
        document.getElementById('app').innerHTML = renderErrorReview();
        bindEvents();
      }
      break;
    case 'clearAllData':
      if (confirm('确定要清除全部学习数据吗？（包括错题记录和测试历史）此操作不可撤销。')) {
        clearAllData();
        showToast('全部数据已清除');
        document.getElementById('app').innerHTML = renderStats();
        bindEvents();
      }
      break;
    case 'showWordDetail':
      const w = el.dataset.word;
      const v = VOCAB.find(vv => vv.w === w);
      if (v) {
        const rate = getErrorRate(w);
        const s2 = getErrorStats()[w];
        showToast(`${v.w} — ${v.c}  |  错误率: ${s2 ? Math.round(rate*100)+'% ('+s2.wrong+'/'+s2.total+')' : '未测试'}`);
      }
      break;
  }
}

function handleQCRange(e) {
  state.questionCount = parseInt(e.target.value);
  const display = document.getElementById('qcDisplay');
  if (display) display.textContent = state.questionCount;
}

let wbSearchTimeout;
function handleWBSearch(e) {
  clearTimeout(wbSearchTimeout);
  wbSearchTimeout = setTimeout(() => {
    document.getElementById('app').innerHTML = renderWordBank(e.target.value);
    bindEvents();
  }, 300);
}

// ==================== INIT ====================
render();
</script>
</body>
</html>
